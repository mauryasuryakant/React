<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chrome Extension - Adjusted Native Height</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');

    body {
      margin: 0;
      padding: 0;
      /* Background matches the Chrome extension popup canvas */
      background-color: #1a1a1a;
      font-family: 'Montserrat', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* Native Width kept at 360px.
      Height reduced directly to 480px (Safely below the 489px max limit).
    */
    .bento-container {
      position: relative;
      width: 360px;
      height: 480px; 
      background-color: #2c2a1a;
      border: 4px solid #3c3a26;
      border-radius: 28px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      overflow: hidden;
    }

    .bento-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .label {
      position: absolute;
      box-sizing: border-box;
      pointer-events: none;
    }

    .label h3 {
      margin: 0;
      font-size: 11.5px;
      line-height: 1.25;
      color: #2c2a1a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .label.pink h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.05;
      color: #fadd4b;
      text-transform: uppercase;
      letter-spacing: -0.5px;
    }

    .vertical-text {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      font-size: 11px;
      font-weight: 900;
      color: #2c2a1a;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="bento-container">
    <svg class="bento-svg" viewBox="0 0 360 480" xmlns="http://www.w3.org/2000/svg">
      
      <path d="
        M 170 8 
        L 208 8 A 16 16 0 0 1 224 24 
        L 224 48 A 16 16 0 0 0 240 64 
        L 336 64 A 16 16 0 0 1 352 80 
        L 352 160 A 16 16 0 0 1 336 176 
        L 308 176 A 16 16 0 0 0 292 192 
        L 292 294 A 16 16 0 0 1 276 310 
        L 204 310 A 16 16 0 0 0 188 326 
        L 188 348 A 16 16 0 0 1 172 364 
        L 110 364 A 16 16 0 0 1 94 348 
        L 94 182 A 16 16 0 0 1 110 166 
        L 138 166 A 16 16 0 0 0 154 150 
        L 154 24 A 16 16 0 0 1 170 8 
        Z" 
        fill="#fb4ce4" 
      />

      <path d="
        M 24 262 
        L 72 262 A 16 16 0 0 1 88 278 
        L 88 354 A 16 16 0 0 0 104 370 
        L 172 370 A 16 16 0 0 1 188 386 
        L 188 456 A 16 16 0 0 1 172 472

      <rect x="194" y="316" width="158" height="156" rx="16" fill="#fadd4b"/>

      <h3>MODULAR<br>DESIGN</h3>
    </div>
    
    <div class="label pink" style="top: 130px; left: 110px;">
      <h1>SMART<br>MODULAR<br>LAYOUT.</h1>
    </div>
    
    <div class="label" style="top: 182px; left: 298px; width: 54px; height: 128px; display: flex; justify-content: center; align-items: center;">
      <div class="vertical-text">INNOVATION</div>
    </div>
    
    <div class="label" style="top: 336px; left: 214px;">
      <h3>MODERN UI<br>SYSTEM</h3>
    </div>
  </div>

</body>
</html>
