<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exact Values Toolbox Design</title>
<style>
    :root {
        /* Exact color values sampled from the image */
        --bg-app: #0B0E14;
        --bg-container: #131520;
        --container-border: #2C2F48;
        
        --color-yellow: #FFC248;
        --color-purple-light: #A467FF;
        --color-pink: #FF5EAD;
        
        --color-cyan: #3BD3E4;
        --color-center-bg: #11131E; /* The dark space in the middle */
        --color-green: #50E39A;
        
        --color-coral: #FF6D5D;
        --color-blue: #2B9BFF;
        --color-purple-dark: #9163FF;
        
        --icon-stroke: #18191C;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        background-color: var(--bg-app);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: system-ui, -apple-system, sans-serif;
    }

    /* The outer dark container */
    .toolbox-container {
        background-color: var(--bg-container);
        padding: 12px;
        border-radius: 36px;
        border: 2px solid var(--container-border);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    /* The 3x3 Grid */
    .grid {
        display: grid;
        grid-template-columns: repeat(3, 150px);
        grid-template-rows: repeat(3, 150px);
        gap: 12px;
    }

    /* Base Card Styling */
    .card {
        border-radius: 32px;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        transition: transform 0.2s ease;
        cursor: pointer;
    }

    .card:hover {
        transform: scale(0.97);
    }

    /* 3D Inner Shadows to replicate the puffy/embossed look */
    .inset-shadow-light {
        box-shadow: 
            inset 8px 8px 16px rgba(255, 255, 255, 0.35), 
            inset -8px -8px 16px rgba(0, 0, 0, 0.15);
    }
    .inset-shadow-dark {
        box-shadow: 
            inset 8px 8px 16px rgba(255, 255, 255, 0.2), 
            inset -8px -8px 16px rgba(0, 0, 0, 0.25);
    }

    /* Specific Card Colors */
    .c-yellow { background: var(--color-yellow); }
    .c-purple-l { background: var(--color-purple-light); }
    .c-pink { background: var(--color-pink); }
    
    .c-cyan { background: var(--color-cyan); }
    .c-center { background: var(--color-center-bg); border-radius: 32px; position: relative;}
    .c-green { background: var(--color-green); }
    
    .c-coral { background: var(--color-coral); }
    .c-blue { background: var(--color-blue); }
    .c-purple-d { background: var(--color-purple-dark); }

    /* SVG Base Styling */
    svg.icon {
        width: 52px;
        height: 52px;
        stroke: var(--icon-stroke);
        stroke-width: 3.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
    }

    /* Center Glowing Briefcase */
    .glow-icon {
        width: 52px;
        height: 52px;
        stroke: url(#cyan-purple-grad);
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
        filter: drop-shadow(0 0 12px rgba(164, 103, 255, 0.6));
    }

    /* Small Decorative Elements (Dots & Lines) */
    .deco {
        position: absolute;
        display: flex;
        opacity: 0.4;
    }
    
    .dot {
        width: 4px;
        height: 4px;
        background-color: var(--icon-stroke);
        border-radius: 50%;
        margin: 2px;
    }

    /* Decorative Positions */
    .pos-tl { top: 16px; left: 16px; flex-direction: row; }
    .pos-br-grid { bottom: 16px; right: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
    .pos-bl-grid { bottom: 16px; left: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
    
    /* Diagonal Lines Component */
    .diagonal-lines {
        position: absolute;
        bottom: 18px;
        right: 18px;
        display: flex;
        gap: 4px;
        opacity: 0.4;
    }
    .line {
        width: 3px;
        height: 12px;
        background-color: var(--icon-stroke);
        border-radius: 2px;
        transform: rotate(35deg);
    }

    /* Tiny background stars for the center */
    .star {
        position: absolute;
        background: #fff;
        border-radius: 50%;
    }
</style>
</head>
<body>

<div class="toolbox-container">
    <div class="grid">
        
        <div class="card c-yellow inset-shadow-light">
            <div class="deco pos-tl"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <div class="deco pos-br-grid"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <svg class="icon" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" /></svg>
        </div>
        
        <div class="card c-purple-l inset-shadow-dark">
            <div class="deco pos-tl"><div class="dot"></div><div class="dot"></div></div>
            <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" /><path d="M12 6v6l3.5 2.5" /></svg>
        </div>
        
        <div class="card c-pink inset-shadow-light">
            <div class="deco pos-tl"><div class="dot"></div><div class="dot"></div></div>
            <div class="diagonal-lines"><div class="line"></div><div class="line"></div><div class="line"></div></div>
            <svg class="icon" viewBox="0 0 24 24"><path d="M8 18l-6-6 6-6M16 6l6 6-6 6M14 4l-4 16"/></svg>
        </div>

        <div class="card c-cyan inset-shadow-light">
            <div class="deco pos-tl"><div class="dot"></div><div class="dot"></div></div>
            <div class="deco pos-bl-grid"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <svg class="icon" viewBox="0 0 24 24">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
                <line x1="16" y1="13" x2="8" y2="13" />
                <line x1="16" y1="17" x2="8" y2="17" />
                <polyline points="10 9 9 9 8 9" />
            </svg>
        </div>
        
        <div class="card c-center">
            <svg style="position: absolute; width: 100%; height: 100%; top:0; left:0;">
                <path d="M 20 20 Q 25 25 30 20 Q 25 25 25 30 Q 25 25 20 25 Z" fill="#A467FF" opacity="0.8"/>
                <path d="M 120 100 Q 123 103 126 100 Q 123 103 123 106 Q 123 103 120 103 Z" fill="#3BD3E4" opacity="0.8"/>
                <circle cx="110" cy="30" r="1.5" fill="#50E39A" opacity="0.5"/>
                <circle cx="30" cy="120" r="1.5" fill="#3BD3E4" opacity="0.5"/>
            </svg>

            <svg style="width:0; height:0; position:absolute;">
                <defs>
                    <linearGradient id="cyan-purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--color-cyan);stop-opacity:1" />
                        <stop offset="100%" style="stop-color:var(--color-purple-light);stop-opacity:1" />
                    </linearGradient>
                </defs>
            </svg>
            <svg class="glow-icon" viewBox="0 0 24 24">
                <rect x="2" y="7" width="20" height="14" rx="2" ry="2" />
                <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" />
                <line x1="2" y1="12" x2="22" y2="12" />
            </svg>
        </div>

        <div class="card c-green inset-shadow-light">
            <div class="deco pos-tl"><div class="dot"></div><div class="dot"></div></div>
            <div class="deco pos-br-grid"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <svg class="icon" viewBox="0 0 24 24">
                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
            </svg>
        </div>

        <div class="card c-coral inset-shadow-light">
            <div class="deco pos-tl"><div class="dot"></div><div class="dot"></div></div>
            <div class="diagonal-lines"><div class="line"></div><div class="line"></div><div class="line"></div></div>
            <svg class="icon" viewBox="0 0 24 24">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                <circle cx="12" cy="16" r="1.5" stroke="none" fill="var(--icon-stroke)" />
            </svg>
        </div>
        
        <div class="card c-blue inset-shadow-light">
            <div class="deco pos-tl"><div class="dot"></div><div class="dot"></div></div>
            <div class="deco pos-br-grid"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <svg class="icon" viewBox="0 0 24 24">
                <rect x="2" y="4" width="20" height="16" rx="2" ry="2" />
                <path d="M6 9l4 3-4 3" />
                <line x1="12" y1="15" x2="16" y2="15" />
            </svg>
        </div>
        
        <div class="card c-purple-d inset-shadow-dark">
            <div class="deco pos-tl"><div class="dot"></div><div class="dot"></div></div>
            <div class="diagonal-lines"><div class="line"></div><div class="line"></div><div class="line"></div></div>
            <svg class="icon" viewBox="0 0 24 24">
                <path d="M12 2l9 5v10l-9 5-9-5V7z" />
                <circle cx="12" cy="12" r="3.5" />
            </svg>
        </div>

    </div>
</div>

</body>
</html>
